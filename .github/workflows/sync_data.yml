name: 自动同步商品期货主力合约数据

on:
  # 定时触发：日盘/夜盘各设置多次兜底，避免 GitHub Actions 单个 schedule 延迟或跳过导致断更
  schedule:
    # 1. 日盘收盘后同步: 北京时间周一至周五 16:00 - 18:00，每 10 分钟运行一次 (对应 UTC 08:00 - 10:00)
    - cron: '*/10 8-9 * * 1-5'
    - cron: '0 10 * * 1-5'
    # 2. 夜盘收盘后同步: 北京时间周二至周六 03:45 - 05:45，每 10 分钟运行一次 (对应 UTC 19:45 - 21:45)
    - cron: '45,55 19 * * 1-5'
    - cron: '5,15,25,35,45,55 20 * * 1-5'
    - cron: '5,15,25,35,45 21 * * 1-5'
  # 支持在 GitHub 网页上手动触发
  workflow_dispatch:

# 授予工作流向仓库写入（提交、推送）的权限
permissions:
  contents: write

concurrency:
  group: futures-data-sync-main
  cancel-in-progress: false

jobs:
  sync-futures-data:
    name: 同步期货主力合约行情
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查今日是否已同步成功
        id: check_sync
        shell: python
        run: |
          import json, datetime, sys, os
          try:
              with open('data/futures_data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              sync_time_str = data['metadata']['sync_time']
              if 'T' in sync_time_str:
                  sync_time = datetime.datetime.fromisoformat(sync_time_str.split('.')[0])
              else:
                  sync_time = datetime.datetime.strptime(sync_time_str, "%Y-%m-%d %H:%M:%S")
          except Exception as e:
              print("Error reading sync_time, proceeding with sync:", e)
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("skip=false\n")
              sys.exit(0)

          now_utc = datetime.datetime.utcnow()
          print(f"Current UTC Time: {now_utc}")
          print(f"Last sync UTC Time: {sync_time}")

          skip = "false"
          # Day session window (UTC 08:00 - 10:00)
          if 8 <= now_utc.hour < 10:
              if sync_time.date() == now_utc.date() and 7 <= sync_time.hour < 10:
                  skip = "true"
          # Night session window (UTC 19:45 - 21:45)
          elif (now_utc.hour == 19 and now_utc.minute >= 40) or now_utc.hour == 20 or (now_utc.hour == 21 and now_utc.minute <= 50):
              if sync_time.date() == now_utc.date() and 19 <= sync_time.hour < 22:
                  skip = "true"

          print(f"Skip next steps: {skip}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"skip={skip}\n")

      - name: 配置 Python 3.11 环境
        if: steps.check_sync.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库 (akshare, pandas, tqsdk)
        if: steps.check_sync.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install akshare pandas tqsdk

      - name: 运行数据同步脚本 (按持仓量确定主力合约)
        if: steps.check_sync.outputs.skip != 'true'
        env:
          TQ_USERNAME: ${{ secrets.TQ_USERNAME }}
          TQ_PASSWORD: ${{ secrets.TQ_PASSWORD }}
        run: python sync_data.py

      - name: 检查数据是否有更新
        if: steps.check_sync.outputs.skip != 'true'
        id: check_changes
        run: |
          git diff --quiet data/futures_data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 提交并推送最新行情数据
        if: steps.check_sync.outputs.skip != 'true' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/futures_data.json
          git commit -m "data: auto-sync main contracts by OI $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git push

      - name: 数据无变化，跳过推送
        if: steps.check_sync.outputs.skip != 'true' && steps.check_changes.outputs.changed == 'false'
        run: echo "数据文件无变化，无需提交。"
