name: 自动同步商品期货主力合约数据

on:
  # 定时触发：日盘/夜盘各设置多次兜底，避免 GitHub Actions 单个 schedule 延迟或跳过导致断更
  schedule:
    # 1. 日盘收盘后兜底同步: 北京时间 15:10 / 15:30 / 15:50 / 16:10 / 16:30 / 16:50 (Mon-Fri)
    - cron: '10 7 * * 1-5'
    - cron: '30 7 * * 1-5'
    - cron: '50 7 * * 1-5'
    - cron: '10 8 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '50 8 * * 1-5'
    # 2. 夜盘收盘后兜底同步: 北京时间 02:45 / 03:05 / 03:25 / 03:50 / 04:20 / 04:50 (Tue-Sat)
    - cron: '45 18 * * 1-5'
    - cron: '5 19 * * 1-5'
    - cron: '25 19 * * 1-5'
    - cron: '50 19 * * 1-5'
    - cron: '20 20 * * 1-5'
    - cron: '50 20 * * 1-5'
  # 支持在 GitHub 网页上手动触发
  workflow_dispatch:

# 授予工作流向仓库写入（提交、推送）的权限
permissions:
  contents: write

concurrency:
  group: futures-data-sync-main
  cancel-in-progress: false

jobs:
  sync-futures-data:
    name: 同步期货主力合约行情
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python 3.11 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库 (akshare, pandas, tqsdk)
        run: |
          pip install --upgrade pip
          pip install akshare pandas tqsdk

      - name: 运行数据同步脚本 (按持仓量确定主力合约)
        env:
          TQ_USERNAME: ${{ secrets.TQ_USERNAME }}
          TQ_PASSWORD: ${{ secrets.TQ_PASSWORD }}
        run: python sync_data.py

      - name: 检查数据是否有更新
        id: check_changes
        run: |
          git diff --quiet data/futures_data.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 提交并推送最新行情数据
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.name  "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/futures_data.json
          git commit -m "data: auto-sync main contracts by OI $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
          git push

      - name: 数据无变化，跳过推送
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "数据文件无变化，无需提交。"
